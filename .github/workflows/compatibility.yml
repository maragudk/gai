name: Compatibility

on:
  schedule:
    - cron: "14 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        go:
          - { go-version: stable }
          - { go-version-file: go.mod }
        deps:
          - locked
          - latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go.go-version }}
          go-version-file: ${{ matrix.go.go-version-file }}

      - name: Update to latest deps
        if: matrix.deps == 'latest'
        run: go get -u -t ./...

      - name: Set up GCP credentials
        env:
          GOOGLE_VERTEX_CREDENTIALS_JSON: ${{ secrets.GOOGLE_VERTEX_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_VERTEX_CREDENTIALS_JSON" > "$RUNNER_TEMP/vertex.json"
          echo "GOOGLE_VERTEX_CREDENTIALS_PATH=$RUNNER_TEMP/vertex.json" >> "$GITHUB_ENV"

      - name: Test
        run: go test -shuffle on ./...
        env:
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
          GOOGLE_VERTEX_KEY: ${{ secrets.GOOGLE_VERTEX_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
